  <text x="212" y="376" fill="#66706F" font-family="Arial, Helvetica, sans-serif" font-size="15">Cleanliness, staff response, resident activities</text>
  <rect x="154" y="402" width="150" height="28" rx="14" fill="#DDECE8"/>
