    <text x="342" y="302" fill="#66706F" font-size="14">Direct call and profile</text>
    <circle cx="604" cy="402" r="30" fill="#BF7D2A"/>
    <text x="594" y="412" fill="#FFFFFF" font-size="28" font-weight="900">2</text>
